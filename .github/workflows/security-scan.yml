name: Security Scanning Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  schedule:
    # Run daily security scan at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # ========================================================================
  # MAIN SECURITY AUDIT JOB
  # ========================================================================
  security-scan:
    name: Security Audit & Vulnerability Scanning
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # ========================================================================
      # STAGE 1: Dependency Security Checks
      # ========================================================================
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install main dependencies
        # FIX: Use >= so pip resolves compatible versions per Python version
        run: |
          pip install -r requirements.txt
        continue-on-error: true

      - name: Install dev/security dependencies
        run: |
          pip install safety pip-audit bandit pylint detect-secrets pytest pytest-cov

      - name: Scan for known vulnerabilities (pip-audit)
        continue-on-error: true
        run: |
          echo "🔍 Auditing pip packages..."
          pip-audit --desc || echo "pip-audit found issues (non-blocking)"

      - name: Scan for known CVEs (safety)
        continue-on-error: true
        run: |
          echo "🔍 Scanning for known CVEs in dependencies..."
          safety check --output text || echo "Safety found issues (non-blocking)"

      # ========================================================================
      # STAGE 2: Static Application Security Testing (SAST)
      # ========================================================================
      - name: Bandit - Python Security Linter
        run: |
          echo "🔍 Running Bandit security scan..."
          bandit -r ppmap/ -f json -o bandit-report.json || true
          bandit -r ppmap/ -ll -f txt

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          detect-secrets scan > .secrets.baseline && echo "Secrets scan complete"

      # ========================================================================
      # STAGE 3: Custom Security Tests
      # ========================================================================
      - name: Run PPMAP security test suite
        run: |
          echo "🔍 Running PPMAP security test suite..."
          pytest tests/test_security_fixes.py -v --tb=short --junit-xml=security-tests.xml

      - name: Full test coverage analysis
        continue-on-error: true
        run: |
          pytest tests/ --cov=ppmap --cov-report=xml --cov-report=term-missing || true

      # ========================================================================
      # STAGE 4: Report Generation & Upload
      # ========================================================================
      - name: Generate security report
        if: always()
        run: |
          echo "# 🔒 Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> security-report.md
          echo "**Python:** ${{ matrix.python-version }}" >> security-report.md
          echo "" >> security-report.md

          if [ -f bandit-report.json ]; then
              echo "### Bandit Findings" >> security-report.md
              grep -o '"severity": "[^"]*"' bandit-report.json | sort | uniq -c >> security-report.md || true
          fi

          cat security-report.md

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-py${{ matrix.python-version }}
          path: |
            bandit-report.json
            security-report.md
            security-tests.xml

  # ========================================================================
  # OWASP DEPENDENCY CHECK JOB
  # ========================================================================
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Run pip-audit as OWASP-equivalent check
        run: |
          pip install pip-audit
          pip install -r requirements.txt || true
          echo "## 🛡️ OWASP-like Dependency Audit" > owasp-report.txt
          pip-audit --output=json > owasp-report.json || true
          pip-audit >> owasp-report.txt || true
          cat owasp-report.txt

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: |
            owasp-report.json
            owasp-report.txt

  # ========================================================================
  # SONARQUBE / CODE QUALITY ANALYSIS
  # ========================================================================
  code-quality:
    name: SonarQube Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install analysis tools
        run: |
          pip install pylint radon
          pip install -r requirements.txt || true

      - name: Pylint Code Quality
        run: |
          echo "🔍 Running Pylint analysis..."
          pylint ppmap/ --exit-zero --output-format=text || true

      - name: Radon Complexity Analysis
        run: |
          echo "🔍 Cyclomatic Complexity:"
          radon cc ppmap/ -a || true
          echo "🔍 Maintainability Index:"
          radon mi ppmap/ || true

      # FIX: Correct `if:` expression syntax — no ${{ }} wrapping needed here
      # Also: gracefully skip if SONAR_TOKEN is not configured
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # ========================================================================
  # FINAL STATUS JOB
  # ========================================================================
  security-status:
    name: Security Check Status
    runs-on: ubuntu-latest
    # FIX: Also depends on dependency-check and code-quality so result reflects full pipeline
    needs: [security-scan, dependency-check, code-quality]
    if: always()

    steps:
      - name: Evaluate security scan results
        run: |
          echo "Security scan result   : ${{ needs.security-scan.result }}"
          echo "OWASP check result     : ${{ needs.dependency-check.result }}"
          echo "Code quality result    : ${{ needs.code-quality.result }}"

          if [ "${{ needs.security-scan.result }}" = "failure" ]; then
            echo "❌ Core security tests failed — review the security-reports artifacts"
            exit 1
          else
            echo "✅ Security pipeline completed successfully"
            echo "   Core scan  : ${{ needs.security-scan.result }}"
            echo "   OWASP      : ${{ needs.dependency-check.result }}"
            echo "   Code quality: ${{ needs.code-quality.result }}"
          fi
