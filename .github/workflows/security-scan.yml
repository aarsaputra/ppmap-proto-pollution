name: Security Scanning Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily security scan at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-scan:
    name: Security Audit & Vulnerability Scanning
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      # ========================================================================
      # STAGE 1: Dependency Security Checks
      # ========================================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true
      
      - name: Scan for known vulnerabilities (safety)
        continue-on-error: true
        run: |
          pip install safety
          echo "🔍 Scanning for known CVEs in dependencies..."
          safety check --json > safety-report.json || echo "Safety found issues"
          cat safety-report.json
      
      - name: Scan for known vulnerabilities (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          echo "🔍 Auditing pip packages..."
          pip-audit --desc > pip-audit-report.txt || echo "pip-audit found issues"
          cat pip-audit-report.txt
      
      # ========================================================================
      # STAGE 2: Static Application Security Testing (SAST)
      # ========================================================================
      - name: Bandit - Python Security Linter
        continue-on-error: true
        run: |
          pip install bandit
          echo "🔍 Running Bandit security scan..."
          bandit -r ppmap/ -f json -o bandit-report.json || true
          bandit -r ppmap/ -f txt
      
      - name: Pylint - Code Quality & Security
        continue-on-error: true
        run: |
          pip install pylint
          echo "🔍 Running Pylint analysis..."
          pylint ppmap/ --exit-zero --output-format=json > pylint-report.json || true
          pylint ppmap/ --exit-zero || true
      
      - name: Semgrep - Pattern-based Scanning
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/owasp-top-ten
          generateSarif: true
        continue-on-error: true
      
      - name: Check for hardcoded secrets
        continue-on-error: true
        run: |
          pip install detect-secrets
          echo "🔍 Scanning for hardcoded secrets..."
          detect-secrets scan --baseline .secrets.baseline || true
      
      # ========================================================================
      # STAGE 3: Custom Security Tests
      # ========================================================================
      - name: Run custom security tests
        continue-on-error: true
        run: |
          echo "🔍 Running PPMAP security test suite..."
          pip install pytest pytest-cov
          pytest tests/test_security_fixes.py -v --tb=short --junit-xml=security-tests.xml
      
      - name: Test ReDoS Protection
        continue-on-error: true
        run: |
          python -c "
          import time
          import re
          from ppmap.sast import DANGEROUS_SINKS
          
          print('🧪 Testing ReDoS protection...')
          for sink_name in ['bracket_notation', 'JSON.parse']:
              if sink_name not in DANGEROUS_SINKS:
                  continue
              pattern = DANGEROUS_SINKS[sink_name]['pattern']
              regex = re.compile(pattern)
              
              # Test with pathological input
              malicious = 'x[' + '['*100 + '] = 1;'
              start = time.time()
              try:
                  regex.search(malicious)
              except:
                  pass
              elapsed = time.time() - start
              
              if elapsed > 0.1:
                  print(f'⚠️  ReDoS risk in {sink_name}: {elapsed:.4f}s')
              else:
                  print(f'✅ {sink_name} is safe: {elapsed:.4f}s')
          "
      
      - name: Test Path Traversal Protection
        continue-on-error: true
        run: |
          python -c "
          from ppmap.mobile import MobileAppScanner
          import tempfile
          
          print('🧪 Testing path traversal protection...')
          with tempfile.TemporaryDirectory() as tmpdir:
              scanner = MobileAppScanner(temp_dir=tmpdir)
              
              try:
                  scanner._validate_safe_path(tmpdir, '../../etc/passwd')
                  print('❌ Path traversal NOT blocked!')
              except ValueError as e:
                  print(f'✅ Path traversal blocked: {e}')
          "
      
      - name: Test SSL Verification Configuration
        continue-on-error: true
        run: |
          python -c "
          from ppmap.engine import AsyncScanner
          
          print('🧪 Testing SSL verification config...')
          
          scanner_default = AsyncScanner()
          if scanner_default.verify_ssl == True:
              print('✅ Default: SSL verification enabled')
          else:
              print('❌ Default: SSL verification DISABLED')
          
          scanner_insecure = AsyncScanner(verify_ssl=False)
          if scanner_insecure.verify_ssl == False:
              print('✅ Override: SSL verification can be disabled for testing')
          "
      
      # ========================================================================
      # STAGE 4: Code Coverage Analysis
      # ========================================================================
      - name: Code coverage analysis
        continue-on-error: true
        run: |
          pip install pytest-cov
          pytest tests/ --cov=ppmap --cov-report=xml --cov-report=term || true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      
      # ========================================================================
      # STAGE 5: Report Generation
      # ========================================================================
      - name: Generate security report
        if: always()
        run: |
          echo "# 🔒 Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> security-report.md
          echo "**Python:** ${{ matrix.python-version }}" >> security-report.md
          echo "" >> security-report.md
          
          echo "## Detected Issues Summary" >> security-report.md
          
          if [ -f bandit-report.json ]; then
              echo "" >> security-report.md
              echo "### Bandit Findings" >> security-report.md
              grep -o '"severity": "[^"]*"' bandit-report.json | sort | uniq -c || true >> security-report.md
          fi
          
          if [ -f pip-audit-report.txt ]; then
              echo "" >> security-report.md
              echo "### Pip Audit Results" >> security-report.md
              grep -E "(found|vulnerability)" pip-audit-report.txt | head -10 >> security-report.md || true
          fi
          
          cat security-report.md
      
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports-${{ matrix.python-version }}
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.txt
            security-report.md
      
      - name: Comment on PR with security results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('security-report.md') ? 
              fs.readFileSync('security-report.md', 'utf8') : 
              'Security scan completed.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Scan Results\n\n${report}`
            });

  # ========================================================================
  # DEPENDENCY CHECK JOB
  # ========================================================================
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'PPMAP'
          path: '.'
          format: 'JSON'
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: dependency-check-report.json

  # ========================================================================
  # SONARQUBE ANALYSIS JOB
  # ========================================================================
  sonarqube:
    name: SonarQube Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: SonarQube scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=ppmap-security
            -Dsonar.organization=ppmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || '' }}

  # ========================================================================
  # FINAL STATUS JOB
  # ========================================================================
  security-status:
    name: Security Check Status
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: always()
    
    steps:
      - name: Check security test results
        run: |
          if [ "${{ needs.security-scan.result }}" = "failure" ]; then
            echo "❌ Security tests failed - review before merge"
            exit 1
          else
            echo "✅ All security checks passed"
          fi
